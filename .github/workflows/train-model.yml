name: Train Model on Azure ML
on: workflow_dispatch

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Install Azure ML extension
        run: az extension add -n ml -y
      
      - name: Create config.json
        run: |
          echo '{
              "subscription_id": "6a65c104-56f5-4fb1-8bb7-565d7d7f3c44",
              "resource_group": "rg-mlops-learning",
              "workspace_name": "aml-launch"
          }' > config.json
      
      - name: Submit training job
        id: train
        run: |
          JOB_ID=$(az ml job create \
            --name "house-price-train-$(date +%Y%m%d-%H%M%S)" \
            --workspace-name aml-launch \
            --resource-group rg-mlops-learning \
            --code . \
            --command "pip install scikit-learn pandas && python src/train.py" \
            --environment AzureML-sklearn-1.0-ubuntu20.04-py38-cpu@latest \
            --query name -o tsv)
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "✅ Training job submitted: $JOB_ID"
      
      - name: Wait for job completion
        run: |
          az ml job show --name ${{ steps.train.outputs.job_id }} --workspace-name aml-launch --resource-group rg-mlops-learning --query status -o tsv
          echo "⏳ Waiting for training to complete (5-10 minutes)..."
          az ml job wait --name ${{ steps.train.outputs.job_id }} --workspace-name aml-launch --resource-group rg-mlops-learning --timeout 600
      
      - name: Register model
        run: |
          az ml model create \
            --name "california-housing-model" \
            --version 1 \
            --path "azureml://jobs/${{ steps.train.outputs.job_id }}/outputs/artifacts/paths/outputs/model.pkl" \
            --workspace-name aml-launch \
            --resource-group rg-mlops-learning \
            --type custom_model
          echo "✅ Model registered: california-housing-model:1"
      
      - name: Deploy endpoint
        run: |
          az ml online-endpoint create \
            --name housing-predict-endpoint \
            --workspace-name aml-launch \
            --resource-group rg-mlops-learning \
            --auth-mode key || echo "Endpoint may already exist"
          echo "✅ Endpoint ready: housing-predict-endpoint"
