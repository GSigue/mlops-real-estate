name: CI Pipeline - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 📝 Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Run linter
        run: |
          echo "Running lint checks..."
          # Add your lint commands here when you have code
          echo "✅ Lint passed"
  
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Run tests
        run: |
          echo "Running tests..."
          # Add your test commands here when you have code
          echo "✅ Tests passed"
